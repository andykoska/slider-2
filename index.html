<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/beerslider/dist/BeerSlider.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
.beer-slider { height: 100vh; width: 100vw; }
.beer-slider img { height: 100%; width: 100%; object-fit: cover; object-position: center top; display: block; }
</style>
</head>
<body>
<div id="slider" class="beer-slider">
  <img src="before.png" alt="Before">
  <div class="beer-reveal">
    <img src="after.png" alt="After">
  </div>
</div>
<script src="https://unpkg.com/beerslider/dist/BeerSlider.js"></script>
<script>new BeerSlider(document.getElementById('slider'));</script>
</body>
</html>
